name: logicblock
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  fonts:
    - family: JetBrainsMono
      fonts: 
        - asset: 'assets/fonts/JetBrainsMono-VariableFont_wght.ttf'
        - asset: 'assets/fonts/JetBrainsMono-Italic-VariableFont_wght.ttf'
          style: italic

    - family: Inter
      fonts:
        - asset: 'assets/fonts/Inter-VariableFont_opsz,wght.ttf'
        - asset: 'assets/fonts/Inter-Italic-VariableFont_opsz,wght.ttf'
          style: italic

